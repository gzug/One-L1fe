name: Supabase Validate

on:
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-validate.yml'
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-validate.yml'

jobs:
  replay-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link Supabase project
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != ''
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Lint linked Supabase project
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != ''
        run: supabase db lint --linked --fail-on error

      - name: Start local Supabase
        run: supabase start

      - name: Replay migrations from scratch
        run: supabase db reset

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
